services:
  note-service: 
    image: virabshetkar/note-service:debug
    container_name: note-service
    build:
      context: .
      target: debug
    environment:
      - ASPNETCORE_URLS=http://+:8080 # '+' is required for host binding 
      - ASPNETCORE_ENVIRONMENT=Development
      - USE_REMOTE_CONFIG=true
      - REMOTE_CONFIG_URL=http://reverse-proxy/config/services/note-service/ # Trailing slash is required
      - WAIT_FOR_DEBUGGER=true # Required when debugging else turn this off 
    extra_hosts:
      - host.docker.internal:host-gateway # Required for linux based systems not running docker desktop
    ports:
      - 5001:8080
    volumes:
      - ./bin/Debug/net9.0/publish:/app/:ro
    command: ["Service.Note.dll"]
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    networks:
      - local-debug

networks:
  local-debug:
    external: true
